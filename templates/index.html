<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smile Detection - Face Thumbnails</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>😊 Multi Face Smile Detection 😊</h1>
        
        <div class="main-content">
            <div class="video-container">
                <video id="video" autoplay playsinline width="640" height="480"></video>
                <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
                <div id="faceCount">👤 Jumlah Wajah: 0</div>
            </div>
            
            <div class="results-container">
                <h2>🎯 Wajah Terdeteksi</h2>
                <div id="result" class="result-box">
                    Menunggu deteksi...
                </div>
                <div id="faceResults" class="face-results">
                    <!-- Hasil per wajah dengan thumbnail akan ditampilkan di sini -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
